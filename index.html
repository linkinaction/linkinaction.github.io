<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Link in Action is Calgary's centralized platform for discovering community programs and services."
    />
    <title>Link in Action - Calgary Community Resources</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Link in Action",
        "alternateName": "LIA",
        "url": "https://linkinaction.ca/",
        "description": "Calgary's centralized platform for discovering community programs and services",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://linkinaction.ca/directory?search={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Link in Action",
        "alternateName": "LIA",
        "url": "https://linkinaction.ca",
        "description": "Calgary's centralized platform for discovering community programs and services",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Calgary",
          "addressRegion": "AB",
          "addressCountry": "CA"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "linkinaction@gmail.com",
          "contactType": "customer service"
        },
        "sameAs": [
          "https://www.linkedin.com/company/linkinaction",
          "https://www.instagram.com/linkinaction"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
