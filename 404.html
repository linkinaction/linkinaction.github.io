<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      var path = window.location.pathname.replace(/^\//, "");
      window.location.replace("/" + (path ? "#" + path : ""));
    </script>
  </head>
  <body>
    If you are not redirected automatically, follow this <a href="/">link</a>.
  </body>
</html>
